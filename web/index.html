<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Aurora — a privacy-first AI flashcard app. Turn notes into study decks and review them with spaced repetition. Runs in your browser.">
  <meta name="theme-color" content="#0a0a0a">

  <!-- Open Graph -->
  <meta property="og:title" content="Aurora — AI Flashcards">
  <meta property="og:description" content="Turn your notes into flashcards and study smarter with spaced repetition.">
  <meta property="og:type" content="website">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Aurora">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Aurora — AI Flashcards</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0a0a0a; }
    #loading {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #0a0a0a; color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      transition: opacity .35s ease; gap: 20px;
    }
    #loading .brand { font-size: 26px; font-weight: 700; letter-spacing: .5px; }
    #loading .brand span { color: #E4BA2F; }
    #loading .ring {
      width: 46px; height: 46px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,.15); border-top-color: #E4BA2F;
      animation: spin 1s linear infinite;
    }
    #loading .hint { font-size: 13px; color: #94a3b8; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="brand">Aur<span>o</span>ra</div>
    <div class="ring"></div>
    <div class="hint">Loading your flashcards…</div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading');
      if (!el) return;
      el.style.opacity = '0';
      setTimeout(function () { el.remove(); }, 400);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
